<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMDB Workspace</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
</head>

<body>

<!-- LOADER -->
<div id="loader" class="loader">
  <div class="loaderBox">
    <h1>TMDB Image Extractor</h1>
    <h3>by William Hernandez</h3>
    <p id="loaderText">Initializing workspace…</p>
    <div class="progressBar">
      <div class="progressFill"></div>
    </div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="modal" onclick="closeModal(event)">
  <span class="close">×</span>
  <img id="modalImg" class="modal-img">
</div>

<div class="app">
  <aside class="sidebar">
    <h2 class="brand">TMDB Workspace</h2>
    <button class="sideBtn" onclick="showEpisodes()">📺 Episodios</button>
    <button class="sideBtn" onclick="showMovies()">🎬 Movies</button>
    <div class="sideFooter">William Hernandez</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1>Media Metadata Dashboard</h1>
      <span class="badge">TMDB Connected</span>
    </header>

    <section id="metaPanel" class="card" style="display:none"></section>

    <section class="card">
      <h3>📁 Proyectos</h3>
      <div class="actions">
        <button class="btn ghost" onclick="deleteAllProjects()">
          🗑️ Borrar todos los proyectos
        </button>
      </div>
      <div id="projectsList" class="muted">
        No hay proyectos guardados
      </div>
    </section>

    <section id="episodesView" class="card">
      <h3>Extractor de Episodios</h3>

      <input id="tvLink" class="input" placeholder="TMDB Season URL">

      <div class="actions">
        <button class="btn" onclick="extractEpisodes()">Extraer</button>
        <button class="btn ghost" onclick="copyEpisodeLinks()">Copiar Links</button>
        <button class="btn ghost" onclick="copyEpisodeNames()">Copiar Nombres</button>
        <button class="btn ghost" onclick="copyMetaTXT()">Meta TXT</button>
        <button class="btn ghost" onclick="copyMetaJSON()">Meta JSON</button>
        <button class="btn ghost" onclick="copyMetaCSV()">Meta CSV</button>
        <button class="btn ghost" onclick="copyKodiNFO()">Kodi NFO</button>
        <button class="btn ghost" onclick="copyMetaTXT_FULL()">Meta TXT + DESC</button>
        <button class="btn ghost" onclick="copyMetaCSV_FULL()">Meta CSV + DESC</button>
        <button class="btn ghost" onclick="copyKodiNFO_FULL()">Kodi NFO + PLOT</button>
        <button class="btn ghost" onclick="copyDescriptionsOnly()">Copy Only DESC</button>

        <button class="btn ghost" onclick="copySelectedLinks()">Copiar seleccionados</button>
        <button class="btn ghost" onclick="downloadSelectedZip()">Descargar ZIP</button>
        <button class="btn ghost" onclick="clearSelection()">Limpiar selección</button>

        <button class="btn ghost" onclick="selectAllEpisodes()">Select All</button>
        <button class="btn ghost" onclick="unselectAllEpisodes()">Unselect All</button>
      </div>

      <p id="countInfo" class="muted"></p>
      <div id="episodesResult" class="resultGrid"></div>
    </section>

    <section id="moviesView" class="card" style="display:none">
      <h3>Extractor de Movies</h3>
      <input id="movieLink" class="input" placeholder="TMDB Movie URL">
      <div class="actions">
        <button class="btn" onclick="extractMovies()">Extraer</button>
        <button class="btn ghost" onclick="copyMovieLinks()">Copiar Posters</button>
      </div>
      <div id="moviesResult" class="resultGrid"></div>
    </section>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
